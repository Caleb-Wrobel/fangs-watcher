# Publish the Scala watcher image to GHCR — gated on the SPEC.md contract.
#
# Strategy (see ../../PUBLISHING.md):
#   pull_request        -> build + smoke, NEVER push
#   push (main)         -> :edge and :sha-<12>
#   release (scala-vX)  -> :X.Y.Z and :latest   (the tags fangs pins in production)
#
# Per-impl release tags: this repo ships N impls of one contract, so each tongue
# versions independently — Scala releases are tagged `scala-vX.Y.Z`, Go will be
# `go-vX.Y.Z`. The `release` event can't glob tags in `on:`, so the job below
# gates on the prefix; a `go-v*` release just triggers a cheap skipped job here.
#
# amd64 only — the embassy box is the x86 Oracle E2.1.Micro, so ubuntu-24.04
# (x86) runners are arch-matched and no native-image cross-compile ever applies.
name: watcher-scala

on:
  pull_request:
    paths: ['scala/**', 'smoke/**', 'SPEC.md', '.github/workflows/watcher-scala.yml']
  push:
    branches: [main]
    paths: ['scala/**', 'smoke/**', 'SPEC.md', '.github/workflows/watcher-scala.yml']
  release:
    types: [published]

# One publish in flight per ref: two quick pushes to main must not race to
# clobber :edge. Cancel the older run.
concurrency:
  group: watcher-scala-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-24.04
    # Run for every push/PR; for a release, only the Scala impl's own tag prefix.
    # A `go-v*` (or any non-`scala-v*`) release is not this workflow's business.
    if: >-
      github.event_name != 'release' ||
      startsWith(github.event.release.tag_name, 'scala-v')
    permissions:
      contents: read
      packages: write          # GHCR push via the built-in GITHUB_TOKEN — no PAT
    steps:
      - uses: actions/checkout@v5

      # --- Gate 1: the code passes the contract (full suite, dev path) --------
      - uses: VirtusLab/scala-cli-setup@v1
        with:
          jvm: temurin:21
      - name: Contract smoke (dev path)
        run: ./smoke/smoke.py scala

      # --- Build the actual artifact -----------------------------------------
      - name: Build image
        run: podman build -t watcher:ci scala

      # --- Gate 2: the built image boots and serves SPEC's routes ------------
      - name: Boot-and-ping the image
        run: |
          set -euo pipefail
          TOKEN="ci-$(openssl rand -hex 8)"
          # WATCHER_BIND=0.0.0.0 is a CI-only override so the check can reach the
          # process across podman's port mapping. Production binds loopback and
          # fronts the watcher with a sidecar (SPEC § Security) — this is not the
          # deployed posture.
          podman run -d --name w \
            -e WATCHER_TOKEN="$TOKEN" \
            -e WATCHER_DISCORD_WEBHOOK=http://127.0.0.1:9099/hook \
            -e WATCHER_SUBJECT=ci \
            -e WATCHER_BIND=0.0.0.0 \
            -e WATCHER_PORT=8080 \
            -p 127.0.0.1:8080:8080 \
            watcher:ci
          for _ in $(seq 1 30); do
            curl -sf http://127.0.0.1:8080/healthz && break || sleep 2
          done
          code() { curl -s -o /dev/null -w '%{http_code}' "$@"; }
          curl -sf http://127.0.0.1:8080/healthz > /dev/null
          test "$(code -X POST http://127.0.0.1:8080/ping/wrong)"    = 404  # mismatch hidden
          test "$(code -X POST http://127.0.0.1:8080/ping/$TOKEN)"   = 200  # accepted ping
          test "$(code       http://127.0.0.1:8080/ping/$TOKEN)"     = 404  # GET = method-mismatch hidden
          podman logs w || true
          podman rm -f w

      # --- Publish (skipped on pull_request) ---------------------------------
      - name: Compute image + tags
        if: github.event_name != 'pull_request'
        id: meta
        run: |
          set -euo pipefail
          image="ghcr.io/$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')/watcher-scala"
          if [ "${{ github.event_name }}" = "release" ]; then
            # tag is scala-vX.Y.Z -> image tag X.Y.Z
            v="${{ github.ref_name }}"; v="${v#scala-v}"
            tags="$image:$v"
            # :latest only tracks real releases — a prerelease (vX.Y.Z-rc1) must
            # not move the tag fangs would otherwise trust.
            if [ "${{ github.event.release.prerelease }}" != "true" ]; then
              tags="$tags $image:latest"
            fi
          else
            tags="$image:edge $image:sha-${GITHUB_SHA::12}"
          fi
          echo "tags=$tags" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Push
        if: github.event_name != 'pull_request'
        run: |
          set -euo pipefail
          for t in ${{ steps.meta.outputs.tags }}; do
            podman tag watcher:ci "$t"
            podman push "$t"
          done
